name: Deploy Docs

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-build]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download bundled spec from release
        run: |
          curl -sSfL \
            "https://github.com/${{ github.event.client_payload.repo }}/releases/download/${{ github.event.client_payload.tag }}/openapi.yml" \
            -o openapi.yml
          python3 -c "
          import yaml, sys
          doc = yaml.safe_load(open('openapi.yml'))
          if not isinstance(doc, dict):
              print(f'ERROR: openapi.yml root is {type(doc).__name__}, expected a mapping', file=sys.stderr)
              sys.exit(1)
          print(f'Spec OK — openapi {doc.get(\"openapi\", \"??\")}, paths: {len(doc.get(\"paths\", {}))}')
          "

      - name: Generate changelog.json
        env:
          GH_TOKEN: ${{ secrets.DOCS_DEPLOY_TOKEN }}
        run: |
          gh api /repos/${{ github.event.client_payload.repo }}/releases \
            --jq '[.[] | {tag_name, name, body, published_at}]' \
            > changelog.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4